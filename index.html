<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Portal</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --bg-page: #f8f9fa;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --border-color: #dadce0;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-page); 
            color: #3c4043; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* Top Menu Navigation Bar */
        .menu-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }
        .portal-title { font-size: 16px; font-weight: bold; color: #5f6368; }
        .admin-link-btn {
            background-color: #e8f0fe;
            color: var(--primary);
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .admin-link-btn:hover { background-color: #d2e3fc; }

        .panel {
            background: white; 
            padding: 32px; 
            border-radius: 12px; 
            box-shadow: var(--card-shadow); 
            border: 1px solid var(--border-color);
        }

        h2 { margin: 0 0 8px 0; color: #1c3aa9; font-size: 24px; font-weight: 600; }
        .subtitle { color: #5f6368; font-size: 14px; margin-bottom: 24px; }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #202124; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 15px; box-sizing: border-box; background: #ffffff; }
        input:focus { border-color: var(--primary); outline: none; }

        button { background-color: var(--primary); color: white; border: none; padding: 14px; font-size: 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; transition: all 0.2s ease; }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #bcc1c6; cursor: not-allowed; }

        .status { margin-top: 15px; font-weight: 500; font-size: 13px; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <!-- Top Menu Layout Bar -->
    <div class="menu-bar">
        <span class="portal-title">Student Check-In Console</span>
        <a href="login.html" class="admin-link-btn">Lecturer Dashboard Portal →</a>
    </div>

    <!-- STUDENT PANEL ONLY -->
    <div class="panel">
        <h2>Smart Attendance Check-In</h2>
        <div class="subtitle">Secure classroom geofence submission portal.</div>
        
        <div class="form-group">
            <label>Enter Your ID Number</label>
            <input type="text" id="matricNumberField" placeholder="e.g., DEL/2022/010">
        </div>

        <button id="verifyBtn">Mark My Attendance</button>
        <div id="statusMsg" class="status"></div>
    </div>
</div>

<script>
    document.getElementById('verifyBtn').addEventListener('click', async () => {
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('statusMsg');
        const courseCodeInput = "CSC413"; 
        
        const matricInput = document.getElementById('matricNumberField').value.trim();
        if (!matricInput) {
            status.style.color = "red";
            status.innerText = "Please enter your ID Number before checking in.";
            return;
        }

        btn.disabled = true;
        status.style.color = "var(--primary)";
        let liveNoiseLevel = 0;

        try {
            status.innerText = "Listening to classroom ambient noise frequencies...";
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.smoothingTimeConstant = 0.8;
            analyser.fftSize = 1024;

            microphone.connect(analyser);
            analyser.connect(javascriptNode);
            javascriptNode.connect(audioContext.destination);

           let noiseSamples = [];
            javascriptNode.onaudioprocess = () => {
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                
                // Calculate average raw signal strength (from 0 to 255)
                let total = 0;
                for (let i = 0; i < array.length; i++) {
                    total += array[i];
                }
                const rawAverage = total / array.length;
                
                // Map the 0-255 raw scale to a standard 30-90 decibel room range
                // A silent laptop mic registers around 30dB, while talking scales up normally.
                let dbLevel = 30 + (rawAverage / 255) * 60; 
                noiseSamples.push(dbLevel);
            };

            await new Promise(resolve => setTimeout(resolve, 1500));

            stream.getTracks().forEach(track => track.stop());
            audioContext.close();
            
            if (noiseSamples.length > 0) {
                liveNoiseLevel = noiseSamples.reduce((a, b) => a + b, 0) / noiseSamples.length;
            }
            console.log("Captured Ambiance Level:", liveNoiseLevel);

        } catch (audioErr) {
            console.warn("Microphone access denied or unavailable. Defaulting sensor profile.");
            liveNoiseLevel = 0; 
        }

        status.innerText = "Synchronizing coordinate mesh with core system...";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const payload = {
                studentId: matricInput, 
                courseCode: courseCodeInput, 
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                noiseLevel: parseFloat(liveNoiseLevel.toFixed(2)), 
                temperature: 26.2
            };

            try {
                const response = await fetch('http://localhost:5000/api/verify-attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error("Server error");
                
                const result = await response.json();
                status.innerHTML = `<span style="color: ${result.verified ? 'green' : 'red'}">${result.message}</span>`;
            } catch (e) {
                status.style.color = "red";
                status.innerText = "Network transmission timeout / Connection failed.";
            }
            btn.disabled = false;
        }, (geoErr) => {
            status.style.color = "red";
            status.innerText = `Location Error: ${geoErr.message}. Ensure location permissions are granted.`;
            btn.disabled = false;
        }, { enableHighAccuracy: true, timeout: 10000 });
    });
</script>
</body>
</html>
